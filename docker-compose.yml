# Dedicated runner container for the Vault Simulation Viewer.
#
# Why this exists:
#   `gauge run` only works inside the smart-contracts Linux devcontainer
#   (Linux ELF binary + uv venv + bun + Gauge Python plugin, all wired up by
#   `script/setup`). Historically the viewer backend ran on the macOS host
#   and shelled out via `docker exec` into whatever VS Code devcontainer
#   happened to be running — fragile (container name changes, container not
#   running, requires VS Code open, etc).
#
#   This compose file instead builds a long-lived, dedicated container from
#   the *same* Dockerfile as the devcontainer, mounts `smart-contracts` and
#   the viewer backend into it, and runs the FastAPI backend directly inside.
#   `gauge run` then becomes a plain local subprocess.
#
# ── First-time build ──────────────────────────────────────────────────────────
#   cp runner/.env.example runner/.env   # fill in GITHUB_TOKEN
#
#   # Option A — token in shell env (recommended):
#   export GITHUB_TOKEN=ghp_xxxx
#   docker compose build viewer-runner
#
#   # Option B — token passed inline:
#   GITHUB_TOKEN=ghp_xxxx docker compose build viewer-runner
#
#   docker compose up -d
#
#   The build downloads and pre-installs all Python deps (71 packages), bun
#   packages and the Gauge Python plugin into the image. After that,
#   `docker compose up` starts in ~3 seconds — no downloads at container start.
#
# ── Rebuilding after dependency changes ──────────────────────────────────────
#   If pyproject.toml / uv.lock / requirements.txt change:
#     GITHUB_TOKEN=ghp_xxxx docker compose build viewer-runner
#     docker compose up -d --force-recreate viewer-runner
#
# ── Daily usage (no dependency changes) ──────────────────────────────────────
#   docker compose up -d            # starts in ~3 sec
#   docker compose logs -f          # tail logs
#   docker compose down             # stop
#
# Open http://localhost:5173 after starting.

services:
  viewer-runner:
    build:
      # Build context is source/ — the parent of simulation-viewer/ — so both
      # smart-contracts/ and simulation-viewer/ are accessible in the Dockerfile.
      context: ..
      dockerfile: simulation-viewer/runner/Dockerfile
      args:
        UV_VERSION: "0.8.9"
        BUN_VERSION: "1.2.1"
      secrets:
        # GITHUB_TOKEN is passed as a BuildKit secret: never stored in any
        # image layer or visible in `docker history`. Set it in your shell
        # before running `docker compose build`:
        #   export GITHUB_TOKEN=ghp_xxxx
        - github_token
    container_name: sim-viewer-runner
    user: vscode
    working_dir: /workspaces/smart-contracts
    env_file:
      - path: ./runner/.env
        required: false
    environment:
      PYTHONPATH: /workspaces/smart-contracts
      DEVELOPMENT_MODE: "1"
      DOCKER_ENVIRONMENT: "1"
      SMART_CONTRACTS_DIR: /workspaces/smart-contracts
      # Venv paths are baked into the image (set as ENV in the Dockerfile).
      # Repeating them here ensures subprocesses launched via `docker exec`
      # also see the correct values.
      UV_PROJECT_ENVIRONMENT: /opt/sc-venv
      GAUGE_PYTHON_COMMAND: /opt/sc-venv/bin/python
    volumes:
      # smart-contracts source tree (bind-mount, writable so gauge can run)
      - ../smart-contracts:/workspaces/smart-contracts
      # viewer backend source (bind-mount for live reload)
      - ./backend:/opt/viewer-backend
      # runner scripts / .env
      - ./runner:/opt/viewer-runner
      # NOTE: /opt/sc-venv and /opt/viewer-backend-venv are directories baked
      # into the image — no volume mounts needed. smart-contracts/.venv is
      # never touched by this container.
    ports:
      - "8001:8000"
    entrypoint: ["/opt/viewer-runner/entrypoint.sh"]
    restart: unless-stopped

  viewer-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sim-viewer-frontend
    environment:
      VITE_API_PROXY_TARGET: http://viewer-runner:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - viewer-runner
    restart: unless-stopped

secrets:
  github_token:
    environment: GITHUB_TOKEN
